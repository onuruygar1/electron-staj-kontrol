<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staj Uygunluk Kontrolü</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: #1e40af;
      padding: 22px 32px;
    }
    .header h1 {
      color: #fff;
      font-size: 20px;
      font-weight: 700;
    }
    .header p {
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      margin-top: 3px;
    }

    /* ── Content wrapper ── */
    .wrap {
      max-width: 1060px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    /* ── Action row ── */
    .action-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    #analyzeBtn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #analyzeBtn:hover    { background: #1d4ed8; }
    #analyzeBtn:disabled { background: #93c5fd; cursor: not-allowed; }

    .ocr-option { display: none; } /* legacy, unused */

    /* ── API Key bar ── */
    .api-key-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 10px 14px;
      background: #fff;
      border: 1px solid #dbeafe;
      border-radius: 10px;
    }
    .api-key-bar label {
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      white-space: nowrap;
    }
    .api-key-bar input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 12px;
      font-family: 'Consolas', monospace;
      color: #0f172a;
      outline: none;
    }
    .api-key-bar input:focus { border-color: #3b82f6; }
    .api-key-bar button {
      padding: 6px 12px;
      background: #0f172a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .api-key-bar button:hover { background: #1e293b; }
    .gemini-badge {
      display: inline-block;
      background: #d1fae5;
      color: #065f46;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ── Stats ── */
    .stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .stat {
      background: #fff;
      border-radius: 10px;
      padding: 14px 20px;
      min-width: 140px;
      border-left: 4px solid #3b82f6;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .stat.green { border-left-color: #16a34a; }
    .stat.amber { border-left-color: #d97706; }
    .stat.slate { border-left-color: #334155; }
    .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: #64748b; }
    .stat-value { font-size: 30px; font-weight: 700; color: #0f172a; line-height: 1.1; margin-top: 2px; }

    .file-path {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 16px;
      padding: 8px 12px;
      background: #fff;
      border-radius: 6px;
      word-break: break-all;
    }

    .parse-summary {
      margin-bottom: 18px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #334155;
      font-size: 12.5px;
      border-radius: 8px;
      padding: 10px 12px;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: none;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .search-box {
      position: relative;
      flex: 1;
      min-width: 220px;
    }
    .search-box svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      padding: 9px 12px 9px 34px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13.5px;
      background: #fff;
      color: #1e293b;
      outline: none;
      transition: border-color .15s;
    }
    #searchInput:focus { border-color: #3b82f6; }

    .filters {
      display: flex;
      gap: 6px;
    }
    .fbtn {
      padding: 8px 15px;
      border-radius: 8px;
      border: 1.5px solid #cbd5e1;
      background: #fff;
      color: #475569;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .fbtn:hover { border-color: #3b82f6; color: #2563eb; }
    .fbtn.active           { background: #2563eb; border-color: #2563eb; color: #fff; font-weight: 600; }
    .fbtn.active[data-filter="staj1"] { background: #16a34a; border-color: #16a34a; }
    .fbtn.active[data-filter="staj2"] { background: #b45309; border-color: #b45309; }

    #filteredCount {
      font-size: 12px;
      color: #94a3b8;
      white-space: nowrap;
      margin-left: auto;
    }

    /* ── Messages ── */
    .msg {
      padding: 14px 18px;
      background: #fff;
      border-radius: 10px;
      color: #475569;
      font-size: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .msg.err {
      background: #fef2f2;
      color: #b91c1c;
      border-left: 4px solid #f87171;
    }

    /* ── Student card ── */
    .card {
      background: #fff;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
      overflow: hidden;
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      padding: 13px 18px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    .s-name { font-size: 15px; font-weight: 700; color: #0f172a; }
    .s-no   { font-size: 12px; color: #94a3b8; margin-top: 1px; }
    .parse-warn {
      margin-top: 6px;
      display: inline-block;
      font-size: 11.5px;
      font-weight: 600;
      color: #92400e;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 6px;
      padding: 3px 8px;
    }
    .pills  { display: flex; gap: 7px; flex-wrap: wrap; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .pill.ok  { background: #dcfce7; color: #166534; }
    .pill.bad { background: #fee2e2; color: #991b1b; }
    .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #94a3b8;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
    }
    tbody td {
      padding: 9px 16px;
      font-size: 13.5px;
      border-bottom: 1px solid #f1f5f9;
      color: #334155;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f8fafc; }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .tag.s1  { background: #dbeafe; color: #1d4ed8; }
    .tag.s2  { background: #dcfce7; color: #15803d; }
    .tag.pre { background: #fef9c3; color: #854d0e; }

    .grade {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 700;
      background: #f1f5f9;
      color: #334155;
    }
    .grade.none { background: #fef2f2; color: #ef4444; font-style: italic; font-weight: 400; font-size: 12.5px; }

    .ok-txt  { color: #16a34a; font-weight: 600; font-size: 13px; }
    .bad-txt { color: #dc2626; font-weight: 600; font-size: 13px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Staj I / Staj II Uygunluk Kontrolü</h1>
    <p>PDF transkriptini seçin, öğrencilerin uygunluğu otomatik hesaplanır.</p>
  </div>

  <div class="wrap">
    <div class="api-key-bar">
      <label>Gemini API Key:</label>
      <input type="password" id="geminiApiKey" placeholder="AIza... (isteğe bağlı — daha doğru ayrıştırma için)" autocomplete="off" />
      <button id="saveKeyBtn">Kaydet</button>
    </div>

    <div class="action-row">
      <button id="analyzeBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
        PDF Seç ve Analiz Et
      </button>
    </div>

    <div id="summary"></div>

    <div id="toolbar">
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="searchInput" type="text" placeholder="İsim veya öğrenci no ile ara…" />
      </div>
      <div class="filters">
        <button class="fbtn" data-filter="staj1">Staj I Alabilen</button>
        <button class="fbtn" data-filter="staj2">Staj II Alabilen</button>
      </div>
      <span id="filteredCount"></span>
    </div>

    <div id="results"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
